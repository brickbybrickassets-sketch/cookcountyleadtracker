name: Cook County Lead Scraper
 
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default: 7)"
        required: false
        default: "7"
 
permissions:
  contents: write
  pages: write
  id-token: write
 
concurrency:
  group: "scrape"
  cancel-in-progress: true
 
jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
 
    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      DASHBOARD_DIR: dashboard
      DATA_DIR: data
      GHL_CSV_PATH: data/ghl_export.csv
      HEADLESS: "true"
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml dbfread rapidfuzz
 
      - name: Prepare output directories
        run: mkdir -p dashboard data
 
      - name: Run lead scraper
        run: python scraper/fetch.py
        timeout-minutes: 10
 
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cook-county-leads-${{ github.run_id }}
          path: |
            data/records.json
            data/ghl_export.csv
            dashboard/records.json
          retention-days: 30
 
      - name: Commit and push records
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Leads update — ${TIMESTAMP}"
            git push
          fi
 
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'
 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
 
      - name: Setup Pages
        uses: actions/configure-pages@v4
 
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
 
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
