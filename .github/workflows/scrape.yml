name: Cook County Lead Scraper

on:
  schedule:
    # Run daily at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
      DASHBOARD_DIR: dashboard
      DATA_DIR: data
      GHL_CSV_PATH: data/ghl_export.csv
      HEADLESS: "true"

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python setup ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      # ── Install dependencies ──────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      # ── Install Playwright browsers ──────────────────────────────────────────
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ── Create output directories ─────────────────────────────────────────────
      - name: Prepare output directories
        run: |
          mkdir -p dashboard data

      # ── Run scraper ───────────────────────────────────────────────────────────
      - name: Run lead scraper
        run: python scraper/fetch.py
        continue-on-error: false

      # ── Upload artifacts ──────────────────────────────────────────────────────
      - name: Upload scrape artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cook-county-leads-${{ github.run_id }}
          path: |
            data/records.json
            data/ghl_export.csv
            dashboard/records.json
          retention-days: 30

      # ── Commit updated JSON ───────────────────────────────────────────────────
      - name: Commit and push records
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard/records.json data/records.json data/ghl_export.csv || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            TOTAL=$(python -c "
          import json, pathlib
          p = pathlib.Path('data/records.json')
          d = json.loads(p.read_text()) if p.exists() else {}
          print(d.get('total', 0))
          ")
            git commit -m "🏠 Leads update: ${TOTAL} records — ${TIMESTAMP}"
            git push
          fi

  # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────────
  deploy-pages:
    needs: scrape
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
